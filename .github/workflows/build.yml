name: Build ZenCloud

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Package jar only
        run: |
          JAR=$(find build/libs -maxdepth 1 -name 'zencloud-*.jar' | grep -v sources | head -n1)
          if [ -z "$JAR" ]; then
            JAR=$(find build/libs -maxdepth 1 -name '*.jar' | grep -v sources | head -n1)
          fi
          echo "Found jar: $JAR"
          mkdir -p dist
          cp "$JAR" dist/ZenCloud-1.0.0-1.8.9.jar

      - name: Upload artifact (jar only)
        uses: actions/upload-artifact@v4
        with:
          name: ZenCloud-1.0.0-1.8.9
          path: dist/ZenCloud-1.0.0-1.8.9.jar
          if-no-files-found: error
